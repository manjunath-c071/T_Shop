{% extends 'base/base.html' %}

{% block title %}
Add Product
{% endblock %}


{% block content %}
<section>
    <div class="card">
        <form method="post" enctype="multipart/form-data">
    {% csrf_token %}

    {% for field in form %}
        {% include 'base/includes/basicFormField.html' %}
    {% endfor %}

    <div class="text-center mt-4 mb-3">
        <button type="submit" class="btn btn-primary px-4 py-2">
            Save
        </button>
    </div>
</form>
    </div>
</section>
{% endblock %}
